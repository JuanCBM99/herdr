name: docs

on:
  push:
    branches:
      - main
      - dev

jobs:
  pkgdown:
    runs-on: macOS-latest

    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      # Eliminamos RSPM matrix ya que no la estamos usando en este script simple

    steps:
      - uses: actions/checkout@v4  # Actualizado de v2 a v4

      - uses: r-lib/actions/setup-r@v2  # Actualizado de v1 a v2

      - uses: r-lib/actions/setup-pandoc@v2  # Actualizado de v1 a v2

      - name: Install dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck"), repos = "https://cloud.r-project.org")
          remotes::install_deps(dependencies = TRUE)
          install.packages("pkgdown", type = "binary")
        shell: Rscript {0}

      - name: Install package
        run: R CMD INSTALL .

      - name: Deploy package
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          Rscript -e 'pkgdown::deploy_to_branch(new_process = FALSE)'
